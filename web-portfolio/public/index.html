<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 
    Ya no se necesita la redirección meta refresh aquí, 
    ya que la página raíz (app/page.tsx) manejará la lógica de redirección.
    Si el usuario aterriza en la raíz (ej: www.dominio.com), 
    Next.js servirá el app/page.tsx (o su versión estática) 
    que luego ejecutará la lógica de detección de idioma en el cliente.
  -->
  <!-- <meta http-equiv="refresh" content="0;url=/"> -->
  <title>Retro Era Portfolio</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: white;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin-top: 0;
    }
    a {
      color: #ffff00;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
    .loading-indicator {
      margin-top: 2rem;
    }
    .dots span {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: white;
      margin: 0 5px;
      animation: dot-pulse 1.5s infinite ease-in-out;
    }
    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes dot-pulse {
      0%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Retro Era Portfolio</h1>
    <p>Loading portfolio...</p>
    <div class="loading-indicator">
      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <!-- 
    Este script es un fallback en caso de que el enrutamiento de Next.js no se active inmediatamente
    o si hay problemas con la carga de la página raíz.
    Redirige a la página raíz donde la lógica de detección de idioma de Next.js se ejecutará.
  -->
  <script>
    // Si después de un breve momento no hemos sido redirigidos por Next.js,
    // forzamos una redirección a la raíz para que app/page.tsx se ejecute.
    // Esto es más un seguro. En la mayoría de los casos, Next.js manejará esto.
    setTimeout(function() {
      if (window.location.pathname === '/index.html' || window.location.pathname === '/') {
         // No redirigir si ya estamos en una ruta de idioma
        if (!window.location.pathname.startsWith('/en') && !window.location.pathname.startsWith('/es')) {
          // window.location.replace('/'); // Redirige a la raíz para que app/page.tsx tome el control
        }
      }
    }, 50); // Un pequeño retraso para permitir que Next.js actúe primero
  </script>
</body>
</html>
